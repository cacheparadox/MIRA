
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - KOKORO_BASE_URL=http://kokoro:8880/v1
    depends_on:
      - kokoro
    restart: unless-stopped

  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    ports:
      - "8880:8880"
    volumes:
      - kokoro_data:/app/data
    restart: unless-stopped
    environment:
      - OMP_NUM_THREADS=4
    # Removed memory limits to allow full system resource utilization

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  kokoro_data:
