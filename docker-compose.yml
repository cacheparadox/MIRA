version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - KOKORO_BASE_URL=http://kokoro:8880/v1
    depends_on:
      - kokoro
    restart: unless-stopped

  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    ports:
      - "8880:8880"
    volumes:
      - kokoro_data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G # Safely limit RAM usage out of Oracle's 24GB

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  kokoro_data:
